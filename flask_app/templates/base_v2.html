<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="text/javascript" src="{{ url_for('static', filename='js/main_page/record_manager.js') }}"></script>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %} {% endblock %}</title>
    {% block head %}

    {% endblock %}
</head>
<body>
<div class="container mt-5">
    <div class="row">
        <div class="col-md-2">
            <a href="{{ url_for('main_page.index') }}" class="text-body text-decoration-none"><h1> {% block navbar_title %} LiveGaze {% endblock %}</h1></a>
        </div>
        {% block navbar_mid %}
            <div class="col-md-2">
                <button class="btn btn-danger w-100" id="record_button" onclick="toggleRecord()">Start Recording</button>
            </div>
            <div class="col-md-2">
                <a href="{{ url_for('da.get_sessions') }}">
                    <button class="btn btn-secondary w-100">Data Download</button>
                </a>
            </div>
            <div class="col-md-2">
                <a href="{{  url_for('boards.add_artwork')}}">
                    <button class="btn btn-secondary w-100">Create Board</button>
                </a>
            </div>
            <div class="col-md-2">
                <a href=" {{ url_for('trackers.trackers_list') }}">
                    <button class="btn btn-secondary w-100">Eye Trackers</button>
                </a>
            </div>
        {% endblock %}
        <div class="col-md-2 d-flex align-items-center">
            <div class="text-end w-100">
                <p> Hello! {{ current_user.username }} </p>
            </div>
        </div>
    </div>

    {% block page_content %}
    {% endblock %}
</div>

</body>
</html>
