services:
  flask:
    build:
      context: .
      dockerfile: flask_app/Dockerfile
    container_name: flask_app
    ports:
      - "127.0.0.1:5100:5100"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - WTF_CSRF_SECRET_KEY=${WTF_CSRF_SECRET_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - STIMULI_UPLOAD_DIR=/app/flask_app/static/artworks
      - STIMULI_PUBLIC_PATH=static/artworks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./flask_app:/shared/flask_app
      - ./data/artworks:/app/flask_app/static/artworks
    restart: unless-stopped
    networks:
      - backend
      - frontend

  daemon:
    build: ./daemon
    container_name: daemon_service
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - WTF_CSRF_SECRET_KEY=${WTF_CSRF_SECRET_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - STIMULI_UPLOAD_DIR=/app/flask_app/static/artworks
      - STIMULI_PUBLIC_PATH=static/artworks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./flask_app:/shared/flask_app
      - ./data/artworks:/app/flask_app/static/artworks
    working_dir: /app
    restart: unless-stopped
    networks:
      - backend

  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./init_scripts/create_sequence.sql:/docker-entrypoint-initdb.d/db.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7
    container_name: redis_cache
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD}\""]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend

volumes:
  pgdata:

networks:
  backend:
  frontend: